<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Instagram Question Sticker & DM Simulator</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      background: linear-gradient(135deg, #353d4e 0%, #4b5563 100%);
      min-height: 100vh;
      padding: 3rem 1rem 3rem 1rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'Roboto', 'Oxygen', 'Ubuntu', 'Cantarell', sans-serif;
    }

    .container {
      max-width: 1200px;
      margin: 0 auto;
    }

    .header {
      margin-bottom: 2rem;
      text-align: center;
    }

    .header h1 {
      color: white;
      font-size: 2.5rem;
      margin-bottom: 1rem;
    }

    .tabs {
      display: flex;
      gap: 1rem;
      margin-bottom: 2rem;
      justify-content: center;
    }

    .tab-button {
      padding: 0.75rem 2rem;
      border: none;
      background: rgba(255, 255, 255, 0.2);
      color: white;
      border-radius: 0.5rem;
      cursor: pointer;
      font-weight: 600;
      transition: all 0.3s;
      font-size: 1rem;
    }

    .tab-button.active {
      background: white;
      color: #111827;
    }

    .tab-button:hover {
      background: rgba(255, 255, 255, 0.3);
    }

    .tab-button.active:hover {
      background: white;
    }

    .tab-content {
      display: none;
    }

    .tab-content.active {
      display: block;
    }

    .grid {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 2.5rem;
    }

    @media (max-width: 1024px) {
      .grid {
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 2.5rem;
      }

      .preview-section, 
      .control-panel {
        width: 100%;
        max-width: 500px;
      }
    }

    .preview-section {
      grid-column: span 2;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    .sticker {
      background: #fef08a;
      border-radius: 1.5rem;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
      overflow: hidden;
      margin: 0 auto;
      font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
      width: 100%;
      max-width: 430px;
      display: flex;
      flex-direction: column;
    }

    .sticker-header {
      background: #000000;
      color: #d1d5db;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 0 12px;
      flex-shrink: 0;
      height: 73px;
      font-size: 18px;
      font-weight: 500;
      letter-spacing: 0.3px;
      word-break: break-word;
      overflow-wrap: break-word;
      white-space: normal;
      cursor: text;
      outline: none;
      transition: background 0.2s;
      user-select: text;
    }

    .sticker-header:hover {
      background: #000;
    }

    .sticker-header:focus {
      background: #000;
    }

    .sticker-body {
      background: white;
      color: #111827;
      display: flex;
      align-items: center;
      justify-content: center;
      text-align: center;
      padding: 24px 32px;
      font-weight: 500;
      line-height: 1.35;
      word-break: break-word;
      overflow-wrap: break-word;
      white-space: normal;
      cursor: text;
      outline: none;
      transition: background 0.2s;
      user-select: text;
      font-size: 26px;
      min-height: 120px;
    }

    .sticker-body:hover {
      background: #f3f4f6;
    }

    .sticker-body:focus {
      background: #f3f4f6;
    }

    .dm-preview {
      background: white;
      border-radius: 1.5rem;
      box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.3);
      width: 100%;
      max-width: 400px;
      height: 600px;
      overflow-y: auto;
      padding: 1rem;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui;
    }

    .dm-header {
      background: white;
      padding: 1rem;
      border-bottom: 1px solid #e5e7eb;
      text-align: center;
      font-weight: 600;
      color: #111827;
      position: sticky;
      top: 0;
    }

    .message {
      display: flex;
      margin: 0.75rem 0;
      animation: slideIn 0.3s ease-out;
      gap: 0.5rem;
    }

    @keyframes slideIn {
      from {
        opacity: 0;
        transform: translateY(10px);
      }
      to {
        opacity: 1;
        transform: translateY(0);
      }
    }

    .message.user {
      justify-content: flex-end;
    }

    .message.other {
      justify-content: flex-start;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: #000000;
      flex-shrink: 0;
    }

    .message-bubble {
      max-width: 80%;
      padding: 0.75rem 1rem;
      border-radius: 1rem;
      word-break: break-word;
    }

    .message.user .message-bubble {
      background: #0a7aff;
      color: white;
      border-bottom-right-radius: 0.25rem;
    }

    .message.other .message-bubble {
      background: #e5e5ea;
      color: #111827;
      border-bottom-left-radius: 0.25rem;
    }

    .control-panel {
      display: flex;
      flex-direction: column;
      gap: 1.5rem;
    }

    .card {
      background: white;
      border-radius: 0.75rem;
      padding: 1.5rem;
      box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1);
    }

    .card h3 {
      color: #111827;
      font-size: 1.125rem;
      margin-bottom: 1rem;
    }

    .stat {
      margin-bottom: 1rem;
    }

    .stat-label {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 0.5rem;
      font-size: 0.875rem;
      font-weight: 600;
    }

    .stat-label span:first-child {
      color: #374151;
    }

    .stat-label span:last-child {
      color: #16a34a;
      font-weight: bold;
    }

    .stat-bar {
      height: 0.5rem;
      background: #d1d5db;
      border-radius: 9999px;
      overflow: hidden;
    }

    .stat-fill {
      height: 100%;
      background: #22c55e;
      border-radius: 9999px;
      transition: width 0.3s;
    }

    .button {
      padding: 0.75rem 1rem;
      border: none;
      border-radius: 0.5rem;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
      font-size: 0.875rem;
    }

    .button-primary {
      background: #2563eb;
      color: white;
      width: 100%;
    }

    .button-primary:hover {
      background: #1d4ed8;
    }

    .button-secondary {
      background: #6b7280;
      color: white;
      width: 100%;
    }

    .button-secondary:hover {
      background: #4b5563;
    }

    .button-danger {
      background: #dc2626;
      color: white;
      width: 100%;
    }

    .button-danger:hover {
      background: #b91c1c;
    }

    .input-group {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }

    .input-group input {
      flex: 1;
      padding: 0.75rem;
      border: 1px solid #d1d5db;
      border-radius: 0.5rem;
      font-size: 0.875rem;
    }

    .input-group button {
      padding: 0.75rem 1.5rem;
    }

    .toggle-group {
      display: flex;
      gap: 0.5rem;
      margin-bottom: 1rem;
      background: #f3f4f6;
      padding: 0.5rem;
      border-radius: 0.5rem;
    }

    .toggle-btn {
      flex: 1;
      padding: 0.5rem;
      border: none;
      background: transparent;
      cursor: pointer;
      font-weight: 600;
      border-radius: 0.375rem;
      transition: all 0.2s;
      font-size: 0.875rem;
    }

    .toggle-btn.active {
      background: white;
      color: #2563eb;
    }

    .toggle-btn {
      color: #6b7280;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="header">
      <h1>📱 Instagram Content Creator</h1>
    </div>

    <div class="tabs">
      <button class="tab-button active" onclick="switchTab('sticker')">
        ❓ Sticker Question
      </button>
      <button class="tab-button" onclick="switchTab('dm')">
        💬 Simulation DM
      </button>
    </div>

    <!-- TAB 1: STICKER -->
    <div id="sticker" class="tab-content active">
      <div class="grid">
        <div class="preview-section">
          <div class="sticker" id="sticker-element">
            <div class="sticker-header" id="headerText" contenteditable="true">Posez-moi une question</div>
            <div class="sticker-body" id="questionText" contenteditable="true">Entrez quelque chose...</div>
          </div>
        </div>

        <div class="control-panel">
          <div class="card" id="statsCard">
            <h3>📊 Stats</h3>
            
            <div class="stat">
              <div class="stat-label" id="headerLabel">
                <span>Header (max 60)</span>
                <span id="headerCount">17/60</span>
              </div>
              <div class="stat-bar" id="headerBar">
                <div class="stat-fill" id="headerFill" style="width: 28%"></div>
              </div>
            </div>

            <div class="stat">
              <div class="stat-label" id="questionLabel">
                <span>Question (max 100)</span>
                <span id="questionCount">18/100</span>
              </div>
              <div class="stat-bar" id="questionBar">
                <div class="stat-fill" id="questionFill" style="width: 18%"></div>
              </div>
            </div>
          </div>

          <div class="card">
            <h3>🎯 Actions</h3>
            <button class="button button-primary" onclick="downloadStickerPNG()">
              ⬇️ Télécharger PNG
            </button>
            <button class="button button-secondary" style="margin-top: 0.75rem;" onclick="resetSticker()">
              🔄 Réinitialiser
            </button>
          </div>
        </div>        
      </div>
    </div>

    <!-- TAB 2: DM SIMULATOR -->
    <div id="dm" class="tab-content">
      <div class="grid">
        <div class="preview-section">
          <div class="dm-preview" id="dm-preview">
            <div class="dm-header">Vous</div>
            <div id="messages-container"></div>
          </div>
        </div>

        <div class="control-panel">
          <div class="card">
            <h3>✍️ Ajouter un message</h3>
            
            <div class="toggle-group">
              <button class="toggle-btn active" onclick="toggleSender(this, 'user')">👤 Vous</button>
              <button class="toggle-btn" onclick="toggleSender(this, 'other')">💬 Abonné</button>
            </div>

            <div class="input-group">
              <input type="text" id="messageInput" placeholder="Écris un message..." />
              <button class="button button-primary" onclick="addMessage()">Envoyer</button>
            </div>
          </div>

          <div class="card">
            <h3>🎯 Actions</h3>
            <button class="button button-primary" onclick="downloadDMPNG()">
              ⬇️ Télécharger PNG
            </button>
            <button class="button button-danger" onclick="clearMessages()">
              🗑️ Effacer tous les messages
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/html2canvas@1.4.1/dist/html2canvas.min.js"></script>

  <script>
    // Sticker Logic
    let headerText = 'Posez-moi une question';
    let questionText = 'Entrez quelque chose...';

    const headerEl = document.getElementById('headerText');
    const questionEl = document.getElementById('questionText');

    function updateStats() {
      const headerLength = headerText.length;
      const questionLength = questionText.length;

      document.getElementById('headerCount').textContent = headerLength + '/60';
      document.getElementById('questionCount').textContent = questionLength + '/100';

      document.getElementById('headerFill').style.width = Math.min((headerLength / 60) * 100, 100) + '%';
      document.getElementById('questionFill').style.width = Math.min((questionLength / 100) * 100, 100) + '%';
    }

    headerEl.addEventListener('input', (e) => {
      headerText = e.currentTarget.textContent;
      if (headerText.length > 60) {
        headerText = headerText.substring(0, 60);
        headerEl.textContent = headerText;
      }
      updateStats();
    });

    headerEl.addEventListener('blur', (e) => {
      if (!e.currentTarget.textContent.trim()) {
        headerText = 'Posez-moi une question';
        headerEl.textContent = 'Posez-moi une question';
      }
    });

    questionEl.addEventListener('input', (e) => {
      questionText = e.currentTarget.textContent;
      if (questionText.length > 100) {
        questionText = questionText.substring(0, 100);
        questionEl.textContent = questionText;
      }
      updateStats();
    });

    questionEl.addEventListener('blur', (e) => {
      if (!e.currentTarget.textContent.trim()) {
        questionText = 'Entrez quelque chose...';
        questionEl.textContent = 'Entrez quelque chose...';
        updateStats();
      }
    });

    function resetSticker() {
      headerText = 'Posez-moi une question';
      questionText = 'Entrez quelque chose...';
      headerEl.textContent = 'Posez-moi une question';
      questionEl.textContent = 'Entrez quelque chose...';
      updateStats();
    }

    function downloadStickerPNG() {
      const sticker = document.getElementById('sticker-element');
      html2canvas(sticker, {
        backgroundColor: null,
        scale: 3,
        useCORS: true
      }).then(canvas => {
        const link = document.createElement('a');
        link.download = 'instagram-sticker.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      });
    }

    // DM Logic
    let currentSender = 'user';

    function getRandomAvatarUrl() {
      const randomId = Math.floor(Math.random() * 1000);
      const timestamp = new Date().getTime();
      return `https://picsum.photos/200/200?random=${randomId}&t=${timestamp}`;
    }

    function toggleSender(btn, sender) {
      document.querySelectorAll('.toggle-btn').forEach(b => b.classList.remove('active'));
      btn.classList.add('active');
      currentSender = sender;
    }

    function addMessage(text) {
      const input = document.getElementById('messageInput');
      const messageText = text || input.value.trim();
      
      if (!messageText) return;

      const container = document.getElementById('messages-container');
      const messageDiv = document.createElement('div');
      messageDiv.className = `message ${currentSender}`;
      
      let html = '';
      if (currentSender === 'other') {
        html = `<div class="avatar"></div>`;
      }
      
      html += `<div class="message-bubble">${messageText}</div>`;
      messageDiv.innerHTML = html;
      
      container.appendChild(messageDiv);
      input.value = '';
      document.getElementById('dm-preview').scrollTop = document.getElementById('dm-preview').scrollHeight;
    }

    function clearMessages() {
      document.getElementById('messages-container').innerHTML = '';
    }

    function downloadDMPNG() {
      const dm = document.getElementById('dm-preview');
      html2canvas(dm, {
        backgroundColor: '#ffffff',
        scale: 2,
        useCORS: true
      }).then(canvas => {
        const link = document.createElement('a');
        link.download = 'instagram-dm.png';
        link.href = canvas.toDataURL('image/png');
        link.click();
      });
    }

    function switchTab(tabName) {
      document.querySelectorAll('.tab-content').forEach(tab => {
        tab.classList.remove('active');
      });

      document.querySelectorAll('.tab-button').forEach(btn => {
        btn.classList.remove('active');
      });

      document.getElementById(tabName).classList.add('active');
      event.target.classList.add('active');
    }

    // Initialize
    updateStats();
  </script>
</body>
</html>
